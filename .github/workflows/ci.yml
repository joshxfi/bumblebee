name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Surfaces known advisories without blocking the pipeline; current findings
      # are dev/transitive tooling only. Flip continue-on-error off once triaged.
      - name: Audit dependencies
        run: bun audit --audit-level=high
        continue-on-error: true

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build
